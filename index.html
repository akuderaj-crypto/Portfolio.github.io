<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raj Akude | Kinetic Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animated-bg"></div>
    
    <main class="bento-grid">
        <div class="bento-item profile">
            <div class="photo-wrapper">
                <img src="assets/Raj-photo.jpg" alt="Raj Narasinha Akude">
            </div>
            <h1>Raj Akude</h1>
            <p>MIT Vishwaprayag University</p>
        </div>

        <div class="bento-item cert-ai">
            <span class="tag">New Achievement</span>
            <h3>Modern AI</h3>
            <p>Cisco Networking Academy</p>
            <span class="date">Feb 07, 2026</span>
        </div>

        <div class="bento-item cert-chem">
            <h3>Chemistry ACE</h3>
            <p>Preparatory Course AS1201</p>
            <p class="source">via Coursera</p>
        </div>

        <div class="bento-item gallery">
            <div class="gallery-stack">
                <img src="assets/ai-certificate.jpg" class="stack-img">
                <img src="assets/chemistry-certificate.jpg" class="stack-img">
            </div>
            <p>View All Documents</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
