<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raj Akude | Digital Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav-brutal">

            <a href="#about">INFO</a>
            <a href="#certs">CERTS</a>

    <main class="bento-container">

            <span class="badge">Feb 2026</span>

        <div class="bento-box gallery-box" id="gallery">

            <div class="mini-gallery">
                <img src="assets/ai-certificate.jpg" alt="AI Certificate">
                <img src="assets/chemistry-certificate.jpg" alt="Chemistry Certificate">

        <div class="bento-box contact-box">

            <p>raj@email.com</p>
            <div class="social-row">
                <a href="#">GITHUB</a>
